<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - heb2ing</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }

        /* תפריט שליטה עליון */
        .controls { 
            background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; 
            border: 1px solid #ddd; display: flex; flex-direction: column; gap: 15px; align-items: center;
        }
        .search-box { width: 100%; max-width: 400px; padding: 10px; border-radius: 20px; border: 1px solid #ccc; font-size: 16px; outline: none; }

        /* עיצוב הלשוניות (Tabs) */
        .tabs, .sub-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button, .sub-tab-button { 
            padding: 10px 25px; cursor: pointer; border: none; background: #e0e0e0; 
            border-radius: 25px; font-weight: bold; transition: 0.3s; font-size: 16px;
        }
        .tab-button.active, .sub-tab-button.active { background: #1a73e8; color: white; }
        
        .sub-tabs { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .sub-tab-button { font-size: 14px; padding: 8px 15px; background: #f0f0f0; color: #555; }
        .sub-tab-button.active { background: #fbbc05; color: black; }

        /* הצגה והסתרה */
        .tab-content, .sub-tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active, .sub-tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* טבלאות */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        .sort-options { font-size: 14px; margin-top: 5px; }

        /* תיבת הצעות עם הטופס שלך */
        .suggestion-box { background: #e8f0fe; padding: 20px; border-radius: 10px; margin-top: 30px; text-align: center; }
        .form-wrapper { margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול רשימות heb2ing</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה בכל הרשימות..." onkeyup="filterTables()">
        <div class="sort-options">
            <span>מיין לפי:</span>
            <label><input type="radio" name="sortOrder" value="he" onclick="sortTable('he')"> א"ב עברי</label>
            <label><input type="radio" name="sortOrder" value="en" onclick="sortTable('en')"> A-Z (אנגלי)</label>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'listA')">רשימה א'</button>
        <button class="tab-button" onclick="openTab(event, 'listB')">רשימה ב'</button>
        <button class="tab-button" onclick="openTab(event, 'listC')">רשימה ג'</button>
    </div>

    <div id="listA" class="tab-content active">
        <h2>רשימה א'</h2>
        <table class="sortable-table">
            <thead><tr><th>עברית</th><th>אנגלית</th></tr></thead>
            <tbody>
                <tr><td>בית</td><td>House</td></tr>
                <tr><td>שמש</td><td>Sun</td></tr>
            </tbody>
        </table>
    </div>

    <div id="listB" class="tab-content">
        <h2>רשימה ב'</h2>
        <table class="sortable-table">
            <thead><tr><th>עברית</th><th>אנגלית</th></tr></thead>
            <tbody>
                <tr><td>מים</td><td>Water</td></tr>
                <tr><td>לחם</td><td>Bread</td></tr>
            </tbody>
        </table>
    </div>

    <div id="listC" class="tab-content">
        <h2>רשימה ג' - בחר דירוג:</h2>
        <div class="sub-tabs">
            <button class="sub-tab-button" onclick="openSubTab(event, 'star1')">★ 1</button>
            <button class="sub-tab-button" onclick="openSubTab(event, 'star2')">★★ 2</button>
            <button class="sub-tab-button active" onclick="openSubTab(event, 'star3')">★★★ 3</button>
        </div>

        <div id="star1" class="sub-tab-content">
            <table class="sortable-table">
                <tbody><tr><td>ספר</td><td>Book</td></tr></tbody>
            </table>
        </div>
        <div id="star2" class="sub-tab-content">
            <table class="sortable-table">
                <tbody><tr><td>מחשב</td><td>Computer</td></tr></tbody>
            </table>
        </div>
        <div id="star3" class="sub-tab-content active">
            <table class="sortable-table">
                <tbody><tr><td>מטוס</td><td>Airplane</td></tr></tbody>
            </table>
        </div>
    </div>

    <div class="suggestion-box">
        <h3>הצעה למילה חדשה</h3>
        <p>מלאו את הטופס וההצעה תתווסף לאחר בדיקה:</p>
        <div class="form-wrapper">
            <iframe 
                src="https://docs.google.com/forms/d/e/1FAIpQLSd1Lj23HKtXMkp1sOJ_pE3xluNmWhdNFU7z9JVg5BiAPsLiFg/viewform?embedded=true" 
                width="100%" 
                height="500" 
                frameborder="0" 
                marginheight="0" 
                marginwidth="0">
                בטעינה…
            </iframe>
        </div>
    </div>
</div>

<script>
function openTab(evt, tabName) {
    let i, tabContent, tabButtons;
    tabContent = document.getElementsByClassName("tab-content");
    for (i = 0; i < tabContent.length; i++) { tabContent[i].classList.remove("active"); }
    tabButtons = document.getElementsByClassName("tab-button");
    for (i = 0; i < tabButtons.length; i++) { tabButtons[i].classList.remove("active"); }
    document.getElementById(tabName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

function openSubTab(evt, subName) {
    let i, subContent, subButtons;
    subContent = document.getElementsByClassName("sub-tab-content");
    for (i = 0; i < subContent.length; i++) { subContent[i].classList.remove("active"); }
    subButtons = document.getElementsByClassName("sub-tab-button");
    for (i = 0; i < subButtons.length; i++) { subButtons[i].classList.remove("active"); }
    document.getElementById(subName).classList.add("active");
    evt.currentTarget.classList.add("active");
}

function sortTable(lang) {
    const tables = document.querySelectorAll('.sortable-table');
    tables.forEach(table => {
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        const rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort((a, b) => {
            let cellIndex = (lang === 'he') ? 0 : 1;
            return a.cells[cellIndex].innerText.toLowerCase().localeCompare(b.cells[cellIndex].innerText.toLowerCase(), lang === 'he' ? 'he' : 'en');
        });
        rows.forEach(row => tbody.appendChild(row));
    });
}

function filterTables() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.sortable-table tbody tr');
    rows.forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(input) ? '' : 'none';
    });
}
</script>

</body>
</html>
