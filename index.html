<!DOCTYPE html>
<html dir="rtl" lang="he" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - heb2ing</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --tab-bg: #e0e0e0;
            --primary-blue: #1a73e8;
            --kids-pink: #ff6b6b;
        }

        .dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --tab-bg: #333333;
            --primary-blue: #8ab4f8;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        
        .top-bar { 
            display: flex !important; 
            justify-content: space-between !important; 
            flex-direction: row !important; 
            margin-bottom: 15px; 
            gap: 10px;
        }
        
        .top-btn { padding: 8px 15px; cursor: pointer; border-radius: 20px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); font-weight: bold; transition: 0.3s; min-width: 80px; }
        .top-btn:hover { background: var(--primary-blue); color: white; }
        
        .kids-mode-btn { border-color: var(--kids-pink); color: var(--kids-pink); }
        .kids-mode-btn.active { background: var(--kids-pink); color: white; }

        h1 { text-align: center; color: var(--primary-blue); }
        .controls { background: var(--container-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .search-area { width: 100%; max-width: 400px; display: flex; gap: 5px; align-items: center; }
        .search-box { flex-grow: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border-color); font-size: 16px; outline: none; background: var(--container-bg); color: var(--text-color); }
        
        .filter-options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 6px 14px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.2s; font-weight: 500; }
        .filter-btn.active { background: var(--primary-blue); color: white; }

        .part-filter-area { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 10px; border-top: 1px dashed var(--border-color); padding-top: 10px; }
        .part-group { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; align-items: center; }
        .part-label { font-size: 0.85em; font-weight: bold; min-width: 65px; }
        .part-btn { padding: 4px 10px; border: 1px solid #ccc; background: var(--container-bg); color: var(--text-color); border-radius: 12px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .part-btn.active { background: #34a853 !important; color: white !important; border-color: #34a853 !important; }

        .tabs, .sub-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button, .sub-tab-button { padding: 10px 20px; cursor: pointer; border: none; background: var(--tab-bg); color: var(--text-color); border-radius: 25px; font-weight: bold; transition: 0.3s; font-size: 15px; }
        .tab-button.active { background: var(--primary-blue); color: white; }
        .sub-tab-button.active { background: #fbbc05; color: black; }
        
        .sub-tabs { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 15px; }
        .tab-content, .sub-tab-content { display: none; }
        .tab-content.active, .sub-tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 5px; background: var(--container-bg); }
        td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
        .letter-divider { background-color: rgba(26, 115, 232, 0.1); font-weight: bold; font-size: 1.2em; color: var(--primary-blue); padding: 8px 20px !important; text-align: center !important; }
        
        .info-tag { font-size: 0.75em; color: #777; display: block; margin-top: 3px; font-weight: normal; min-height: 1em; }
        .loading-msg, .no-results { text-align: center; font-weight: bold; padding: 20px; color: #666; }
        .no-results { color: #d93025; font-size: 1.2em; display: none; }
        
        .word-count-display { font-size: 11px; color: #888; text-align: right; margin-bottom: 2px; font-weight: bold; }
        .form-container { margin-top: 40px; border-top: 2px solid var(--border-color); padding-top: 20px; }
        .dark-mode iframe { filter: invert(0.9) hue-rotate(180deg); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <button class="top-btn" id="langBtn" onclick="toggleLanguage()">English</button>
            <button class="top-btn" id="themeBtn" onclick="toggleDarkMode()">🌙</button>
        </div>
        <button class="top-btn kids-mode-btn" id="kidsBtn" onclick="toggleKidsMode()">👶 מצב ילדים: כבוי</button>
    </div>

    <h1 id="mainTitle">ניהול רשימות heb2ing</h1>

    <div class="controls">
        <div class="search-area">
            <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה ברשימה זו..." onkeyup="filterTables()">
        </div>
        
        <div class="filter-options">
            <button class="filter-btn active" id="btn_all" onclick="toggleWordFilter('all', this)">הכל</button>
            <button class="filter-btn" id="btn_word" onclick="toggleWordFilter('word_only', this)">מילים בודדות</button>
            <button class="filter-btn" id="btn_sent_he" onclick="toggleWordFilter('sent_he', this)">משפט בעברית</button>
            <button class="filter-btn" id="btn_sent_en" onclick="toggleWordFilter('sent_en', this)">משפט באנגלית</button>
            <button class="filter-btn" id="btn_sent_both" onclick="toggleWordFilter('sent_both', this)">משפט בשניהם</button>
        </div>

        <div class="part-filter-area" id="partFilterArea">
            <div class="part-group">
                <span class="part-label" id="lbl_part_he">עברית:</span>
                <div id="parts-he-btns" class="part-group"></div>
            </div>
            <div class="part-group">
                <span class="part-label" id="lbl_part_en">אנגלית:</span>
                <div id="parts-en-btns" class="part-group"></div>
            </div>
        </div>

        <div class="sort-options">
            <label><input type="radio" name="sortOrder" value="he" checked onclick="currentSort='he'; renderAll();"> <span id="lbl_sort_he">א"ב עברי</span></label>
            <label><input type="radio" name="sortOrder" value="en" onclick="currentSort='en'; renderAll();"> <span id="lbl_sort_en">A-Z (אנגלי)</span></label>
        </div>
    </div>

    <div id="navigation-wrapper">
        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'listA')" id="tabA">רשימה א'</button>
            <button class="tab-button" onclick="openTab(event, 'listB')" id="tabB">רשימה ב'</button>
            <button class="tab-button" onclick="openTab(event, 'listC')" id="tabC">רשימה ג'</button>
            <button class="tab-button" onclick="openTab(event, 'listALL')" id="tabAll">כל המילים</button>
        </div>

        <div id="listA" class="tab-content active"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
        <div id="listB" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
        <div id="listC" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
        <div id="listALL" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
    </div>

    <div id="loading" class="loading-msg">טוען נתונים...</div>
    <div id="noResults" class="no-results">לא נמצאה מילה מתאימה</div>

    <div class="form-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1Lj23HKtXMkp1sOJ_pE3xluNmWhdNFU7z9JVg5BiAPsLiFg/viewform?embedded=true" width="100%" height="800" frameborder="0">טוען...</iframe>
    </div>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    const badWords = ['shit', 'fuck', 'bitch', 'ass', 'damn', 'nigger', 'nigga','tit','gore','cum','bull bull','dumb','the bill','boner','gay']; 
    
    let allData = [];
    let currentSort = 'he';
    let selectedFilters = new Set(['all']); 
    let selectedPartsHe = new Set();
    let selectedPartsEn = new Set();
    let currentLang = 'he';
    let kidsMode = false;

    const trans = {
        he: { 
            title: "ניהול רשימות heb2ing", search: "חפש מילה ברשימה זו...", all: "הכל", word_only: "מילים בודדות", 
            sent_he: "משפט בעברית", sent_en: "משפט באנגלית", sent_both: "משפט בשניהם", sort_he: 'א"ב עברי', 
            sort_en: "A-Z (אנגלי)", tabA: "רשימה א'", tabB: "רשימה ב'", tabC: "רשימה ג'", tabAll: "כל המילים", 
            loading: "טוען נתונים...", no_results: "לא נמצאה מילה מתאימה", stars_all: "הכל", 
            list_prefix: "רשימה", kids_on: "👶 מצב ילדים: פעיל", kids_off: "👶 מצב ילדים: כבוי", 
            count_prefix: "נמצאו", count_suffix: "מילים", part_he: "עברית:", part_en: "אנגלית:" 
        },
        en: { 
            title: "List Management heb2ing", search: "Search word in this list...", all: "All", word_only: "Single Words", 
            sent_he: "Sentence (Heb)", sent_en: "Sentence (Eng)", sent_both: "Sentence (Both)", sort_he: "Hebrew A-B", 
            sort_en: "English A-Z", tabA: "List A", tabB: "List B", tabC: "List C", tabAll: "All Words", 
            loading: "Loading data...", no_results: "No matching words found", stars_all: "All", 
            list_prefix: "List", kids_on: "👶 Kids Mode: ON", kids_off: "👶 Kids Mode: OFF", 
            count_prefix: "Found", count_suffix: "words", part_he: "Hebrew:", part_en: "English:" 
        }
    };

    function toggleKidsMode() {
        kidsMode = !kidsMode;
        document.getElementById('kidsBtn').innerText = kidsMode ? trans[currentLang].kids_on : trans[currentLang].kids_off;
        document.getElementById('kidsBtn').classList.toggle('active');
        filterTables();
    }

    function toggleLanguage() {
        currentLang = currentLang === 'he' ? 'en' : 'he';
        const isHe = currentLang === 'he';
        
        // כיוון דף
        document.getElementById('mainHtml').dir = isHe ? 'rtl' : 'ltr';
        document.body.style.direction = isHe ? 'rtl' : 'ltr';
        document.getElementById('partFilterArea').style.direction = isHe ? 'rtl' : 'ltr';
        
        // טקסטים כלליים
        document.getElementById('langBtn').innerText = isHe ? 'English' : 'עברית';
        document.getElementById('mainTitle').innerText = trans[currentLang].title;
        document.getElementById('searchInput').placeholder = trans[currentLang].search;
        document.getElementById('kidsBtn').innerText = kidsMode ? trans[currentLang].kids_on : trans[currentLang].kids_off;
        
        // כפתורי פילטר סוג
        document.getElementById('btn_all').innerText = trans[currentLang].all;
        document.getElementById('btn_word').innerText = trans[currentLang].word_only;
        document.getElementById('btn_sent_he').innerText = trans[currentLang].sent_he;
        document.getElementById('btn_sent_en').innerText = trans[currentLang].sent_en;
        document.getElementById('btn_sent_both').innerText = trans[currentLang].sent_both;
        
        // חלקי דיבור - כותרות
        document.getElementById('lbl_part_he').innerText = trans[currentLang].part_he;
        document.getElementById('lbl_part_en').innerText = trans[currentLang].part_en;
        
        // מיון וטאבים
        document.getElementById('lbl_sort_he').innerText = trans[currentLang].sort_he;
        document.getElementById('lbl_sort_en').innerText = trans[currentLang].sort_en;
        document.getElementById('tabA').innerText = trans[currentLang].tabA;
        document.getElementById('tabB').innerText = trans[currentLang].tabB;
        document.getElementById('tabC').innerText = trans[currentLang].tabC;
        document.getElementById('tabAll').innerText = trans[currentLang].tabAll;
        
        setupTabs();
        renderAll();
        updatePartButtons(); // מרענן את הכפתורים שנוצרו דינמית מהשיטס
    }

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        document.getElementById('themeBtn').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                if (!cols[0]) return null;

                let rawLetter = cols[2] ? cols[2].replace('רשימה ', '').trim() : 'א';
                let mappedType = rawLetter === 'א' ? 'A' : (rawLetter === 'ב' ? 'B' : 'C');
                
                const content = (cols[0] + " " + (cols[1] || "")).toLowerCase();
                const isProfane = badWords.some(word => {
                    const regex = new RegExp(`\\b${word}\\b`, 'i');
                    return regex.test(content);
                });

                const partHe = cols[4] ? cols[4].split(',').map(s => s.trim()) : [];
                const partEn = cols[5] ? cols[5].split(',').map(s => s.trim()) : [];

                return { 
                    he: cols[0] || '', en: cols[1] || '', type: mappedType, rawLetter: rawLetter, stars: cols[3] || '3',
                    partHe, partEn,
                    hasSpaceHe: cols[0].trim().includes(' '), hasSpaceEn: (cols[1] || "").trim().includes(' '),
                    isProfane: isProfane
                };
            }).filter(item => item !== null && item.he !== '');

            document.getElementById('loading').style.display = 'none';
            setupTabs();
            renderAll();
            updatePartButtons();
        } catch (e) { document.getElementById('loading').innerText = "Error loading data."; }
    }

    function updatePartButtons() {
        const allHe = [...new Set(allData.flatMap(d => d.partHe))].filter(Boolean).sort();
        const allEn = [...new Set(allData.flatMap(d => d.partEn))].filter(Boolean).sort();
        renderPartGroup('parts-he-btns', allHe, selectedPartsHe);
        renderPartGroup('parts-en-btns', allEn, selectedPartsEn);
    }

    function renderPartGroup(containerId, parts, set) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        parts.forEach(part => {
            const btn = document.createElement('button');
            btn.className = `part-btn ${set.has(part) ? 'active' : ''}`;
            btn.innerText = part;
            btn.onclick = () => {
                if (set.has(part)) set.delete(part); else set.add(part);
                btn.classList.toggle('active');
                filterTables();
            };
            container.appendChild(btn);
        });
    }

    function setupTabs() {
        ['A', 'B', 'C', 'ALL'].forEach(l => {
            const container = document.querySelector(`#list${l} .sub-tabs-container`);
            const content = document.querySelector(`#list${l} .sub-contents`);
            if(!container || !content) return;
            const prefix = l === 'ALL' ? 'ALL' : l;
            const allId = l === 'ALL' ? 'GlobalALL' : l + '_ALL';
            container.innerHTML = `<div class="sub-tabs">
                <button class="sub-tab-button" onclick="openSubTab(event, '${prefix}1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, '${prefix}2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, '${prefix}3')">★★★ 3</button>
                <button class="sub-tab-button active" onclick="openSubTab(event, '${allId}')">${trans[currentLang].stars_all}</button>
            </div>`;
            content.innerHTML = `
                <div class="word-count-display"></div>
                <div id="${prefix}1" class="sub-tab-content"><table id="table${prefix}1"><tbody></tbody></table></div>
                <div id="${prefix}2" class="sub-tab-content"><table id="table${prefix}2"><tbody></tbody></table></div>
                <div id="${prefix}3" class="sub-tab-content"><table id="table${prefix}3"><tbody></tbody></table></div>
                <div id="${allId}" class="sub-tab-content active"><table id="table${allId}"><tbody></tbody></table></div>`;
        });
    }

    function toggleWordFilter(type, btn) {
        if (type === 'all') {
            selectedFilters.clear(); selectedFilters.add('all');
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        } else {
            selectedFilters.delete('all');
            document.getElementById('btn_all').classList.remove('active');
            if (selectedFilters.has(type)) { selectedFilters.delete(type); btn.classList.remove('active'); }
            else { selectedFilters.add(type); btn.classList.add('active'); }
            if (selectedFilters.size === 0) { selectedFilters.add('all'); document.getElementById('btn_all').classList.add('active'); }
        }
        filterTables();
    }

    function renderAll() {
        const tableIds = ['A1','A2','A3','A_ALL','B1','B2','B3','B_ALL','C1','C2','C3','C_ALL','ALL1','ALL2','ALL3','GlobalALL'];
        tableIds.forEach(id => { const el = document.querySelector(`#table${id} tbody`); if(el) el.innerHTML = ''; });
        let sorted = [...allData].sort((a, b) => a[currentSort].localeCompare(b[currentSort], currentLang === 'he' ? 'he' : 'en'));
        let lastLetters = {};
        sorted.forEach(item => {
            const keys = [item.type + item.stars, item.type + '_ALL', 'ALL' + item.stars, 'GlobalALL'];
            keys.forEach(key => {
                const tbody = document.querySelector(`#table${key} tbody`);
                if (!tbody) return;
                const firstChar = item[currentSort].charAt(0).toUpperCase();
                if (lastLetters[key] !== firstChar) {
                    const tr = document.createElement('tr');
                    tr.className = 'letter-row';
                    tr.setAttribute('data-letter', firstChar);
                    tr.innerHTML = `<td colspan="2" class="letter-divider">${firstChar}</td>`;
                    tbody.appendChild(tr);
                    lastLetters[key] = firstChar;
                }
                const tr = document.createElement('tr');
                tr.className = 'data-row';
                tr.setAttribute('data-parent-id', key);
                tr.setAttribute('data-space-he', item.hasSpaceHe);
                tr.setAttribute('data-space-en', item.hasSpaceEn);
                tr.setAttribute('data-type', item.type);
                tr.setAttribute('data-raw-letter', item.rawLetter);
                tr.setAttribute('data-stars', item.stars);
                tr.setAttribute('data-is-profane', item.isProfane);
                tr.setAttribute('data-belongs-to-letter', firstChar);
                tr.setAttribute('data-part-he', item.partHe.join(','));
                tr.setAttribute('data-part-en', item.partEn.join(','));
                tr.innerHTML = `<td><span class="word-text">${item.he}</span><span class="info-tag"></span></td><td>${item.en}</td>`;
                tbody.appendChild(tr);
            });
        });
        filterTables();
    }

    function filterTables() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const activeSubTab = document.querySelector('.tab-content.active .sub-tab-content.active');
        let currentId = activeSubTab ? activeSubTab.id : "";
        let count = 0;

        document.querySelectorAll(".data-row").forEach(r => {
            const isVisibleTable = (r.getAttribute('data-parent-id') === currentId);
            const isProfane = r.getAttribute('data-is-profane') === 'true';
            
            if (kidsMode && isProfane) { r.style.display = "none"; return; }

            const spaceHe = r.getAttribute('data-space-he') === 'true';
            const spaceEn = r.getAttribute('data-space-en') === 'true';
            let matchesType = selectedFilters.has('all');
            if (!matchesType) {
                if (selectedFilters.has('word_only') && (!spaceHe && !spaceEn)) matchesType = true;
                if (selectedFilters.has('sent_he') && spaceHe) matchesType = true;
                if (selectedFilters.has('sent_en') && spaceEn) matchesType = true;
                if (selectedFilters.has('sent_both') && (spaceHe && spaceEn)) matchesType = true;
            }

            const rowPartsHe = r.getAttribute('data-part-he').split(',').filter(Boolean);
            const rowPartsEn = r.getAttribute('data-part-en').split(',').filter(Boolean);
            const matchPartHe = selectedPartsHe.size === 0 || rowPartsHe.some(p => selectedPartsHe.has(p));
            const matchPartEn = selectedPartsEn.size === 0 || rowPartsEn.some(p => selectedPartsEn.has(p));

            if (r.innerText.toLowerCase().includes(q) && isVisibleTable && matchesType && matchPartHe && matchPartEn) {
                r.style.display = "";
                count++;
                const infoTag = r.querySelector('.info-tag');
                const listName = currentLang === 'he' ? r.getAttribute('data-raw-letter') : r.getAttribute('data-type');
                if (currentId === 'GlobalALL') infoTag.innerText = `${trans[currentLang].list_prefix} ${listName} - ★${r.getAttribute('data-stars')}`;
                else if (currentId.startsWith('ALL')) infoTag.innerText = `${trans[currentLang].list_prefix} ${listName}`;
                else if (currentId.includes('_ALL')) infoTag.innerText = `★${r.getAttribute('data-stars')}`;
                else infoTag.innerText = "";
            } else { r.style.display = "none"; }
        });
        
        document.querySelectorAll(".letter-row").forEach(lr => {
            const tbody = lr.parentElement;
            if (tbody.parentElement.id.replace('table','') !== currentId) { lr.style.display = "none"; return; }
            const hasVisible = !!tbody.querySelector(`.data-row[data-belongs-to-letter="${lr.getAttribute('data-letter')}"]:not([style*="display: none"])`);
            lr.style.display = hasVisible ? "" : "none";
        });
        
        document.getElementById('noResults').style.display = (count === 0 && (q !== "" || !selectedFilters.has('all') || kidsMode || selectedPartsHe.size > 0 || selectedPartsEn.size > 0)) ? "block" : "none";
        
        const activeCountDisplay = document.querySelector('.tab-content.active .word-count-display');
        if (activeCountDisplay) {
            activeCountDisplay.innerText = `${trans[currentLang].count_prefix} ${count} ${trans[currentLang].count_suffix}`;
        }
    }

    function openTab(e, id) {
        document.querySelectorAll(".tab-content, .tab-button").forEach(x => x.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    function openSubTab(e, id) {
        const p = e.currentTarget.parentElement;
        p.querySelectorAll(".sub-tab-button").forEach(b => b.classList.remove("active"));
        p.parentElement.parentElement.querySelectorAll(".sub-tab-content").forEach(t => t.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    fetchData();
</script>
</body>
</html>
