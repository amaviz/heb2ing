<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - יד 3</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; margin-bottom: 10px; }
        
        /* תפריט שליטה (חיפוש ומיון) */
        .controls { 
            background: #fff; padding: 20px; border-radius: 8px; margin-bottom: 20px; 
            border: 1px solid #ddd; position: sticky; top: 10px; z-index: 100;
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }
        .search-box { width: 100%; max-width: 400px; padding: 10px; border-radius: 20px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        .sort-options label { margin: 0 10px; font-weight: bold; cursor: pointer; }

        .section { margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        h2 { color: #333; border-right: 4px solid #1a73e8; padding-right: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #f8f9fa; }
        
        .sub-list { margin: 15px 20px 0 0; background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px dashed #ccc; }
        .stars { color: #fbbc05; font-weight: bold; margin-bottom: 5px; }

        .suggestion-box { background: #e8f0fe; padding: 20px; border-radius: 10px; margin-top: 20px; }
        textarea { width: 100%; height: 80px; margin-top: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; resize: none; }
        button { background: #1a73e8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול רשימות יד 3</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה ברשימות..." onkeyup="filterTables()">
        <div class="sort-options">
            <span>מיין לפי:</span>
            <label><input type="radio" name="sortOrder" value="he" onclick="sortTable('he')"> א"ב עברי</label>
            <label><input type="radio" name="sortOrder" value="en" onclick="sortTable('en')"> A-Z (אנגלי)</label>
        </div>
    </div>

    <div class="section">
        <h2>רשימה א'</h2>
        <table class="sortable-table">
            <thead><tr><th>עברית</th><th>אנגלית</th></tr></thead>
            <tbody>
                <tr><td>בית</td><td>House</td></tr>
                <tr><td>שמש</td><td>Sun</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h2>רשימה ב'</h2>
        <table class="sortable-table">
            <thead><tr><th>עברית</th><th>אנגלית</th></tr></thead>
            <tbody>
                <tr><td>מים</td><td>Water</td></tr>
                <tr><td>לחם</td><td>Bread</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h2>רשימה ג'</h2>
        
        <div class="sub-list">
            <p class="stars">★ (כוכב 1)</p>
            <table class="sortable-table">
                <tbody>
                    <tr><td>ספר</td><td>Book</td></tr>
                </tbody>
            </table>
        </div>

        <div class="sub-list">
            <p class="stars">★★ (2 כוכבים)</p>
            <table class="sortable-table">
                <tbody>
                    <tr><td>מחשב</td><td>Computer</td></tr>
                </tbody>
            </table>
        </div>

        <div class="sub-list">
            <p class="stars">★★★ (3 כוכבים)</p>
            <table class="sortable-table">
                <tbody>
                    <tr><td>מטוס</td><td>Airplane</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="suggestion-box">
        <h3>הצעה למילה חדשה</h3>
        <textarea id="userSuggestion" placeholder="כתוב כאן את הצעתך..."></textarea>
        <button onclick="sendSuggestion()">שלח הצעה למנהל</button>
    </div>
</div>

<script>
// פונקציית מיון
function sortTable(lang) {
    const tables = document.querySelectorAll('.sortable-table');
    tables.forEach(table => {
        const tbody = table.querySelector('tbody');
        if (!tbody) return;
        const rows = Array.from(tbody.querySelectorAll('tr'));

        rows.sort((a, b) => {
            let cellIndex = (lang === 'he') ? 0 : 1;
            let valA = a.cells[cellIndex].innerText.toLowerCase();
            let valB = b.cells[cellIndex].innerText.toLowerCase();
            return valA.localeCompare(valB, lang === 'he' ? 'he' : 'en');
        });

        rows.forEach(row => tbody.appendChild(row));
    });
}

// פונקציית חיפוש
function filterTables() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.sortable-table tbody tr');

    rows.forEach(row => {
        const text = row.innerText.toLowerCase();
        row.style.display = text.includes(input) ? '' : 'none';
    });
}

// שליחת הצעה
function sendSuggestion() {
    const msg = document.getElementById('userSuggestion').value;
    if(msg.trim()) {
        alert("ההצעה התקבלה ותיבדק בקרוב!");
        document.getElementById('userSuggestion').value = "";
    }
}
</script>

</body>
</html>
