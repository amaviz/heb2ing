<!DOCTYPE html>
<html dir="rtl" lang="he" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heb2ing - ניהול רשימות</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --tab-bg: #e0e0e0;
            --primary-blue: #1a73e8;
            --kids-pink: #ff6b6b;
            --accent-green: #34a853;
            --accent-purple: #9c27b0;
        }

        .dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --tab-bg: #333333;
            --primary-blue: #8ab4f8;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .top-btn { padding: 8px 16px; cursor: pointer; border-radius: 20px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); font-weight: bold; transition: 0.2s; }
        .top-btn:hover { background: var(--primary-blue); color: white; }
        .kids-mode-btn.active { background: var(--kids-pink); border-color: var(--kids-pink); color: white; }

        .controls { display: flex; flex-direction: column; gap: 15px; background: var(--bg-color); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .search-box { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 25px; border: 1px solid var(--border-color); font-size: 16px; outline: none; }
        
        .filter-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .filter-label { font-weight: bold; font-size: 0.9em; color: var(--primary-blue); }
        .filter-options { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; }
        
        .f-btn { padding: 6px 12px; border: 1px solid var(--border-color); background: var(--container-bg); border-radius: 15px; cursor: pointer; font-size: 13px; color: var(--text-color); transition: 0.2s; }
        .f-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .pos-he.active { background: var(--accent-green); border-color: var(--accent-green); color: white; }
        .pos-en.active { background: var(--accent-purple); border-color: var(--accent-purple); color: white; }

        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 18px; cursor: pointer; border: none; background: var(--tab-bg); border-radius: 20px; font-weight: bold; color: var(--text-color); }
        .tab-btn.active { background: var(--primary-blue); color: white; }
        
        .sub-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; flex-direction: row-reverse; } /* כיוון הפוך כדי ש"הכל" יהיה משמאל */
        .sub-btn { padding: 5px 12px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; border-radius: 10px; font-size: 13px; color: var(--text-color); }
        .sub-btn.active { background: #fbbc05; border-color: #fbbc05; color: black; font-weight: bold; }

        .tab-content, .sub-content { display: none; }
        .tab-content.active, .sub-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: var(--container-bg); }
        td { border: 1px solid var(--border-color); padding: 12px; text-align: center; width: 50%; }
        .tag { font-size: 0.75em; color: #888; display: block; margin-top: 4px; }
        .no-results { text-align: center; padding: 30px; color: #888; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <button class="top-btn" id="langBtn" onclick="toggleLang()">English</button>
            <button class="top-btn" onclick="toggleDark()">🌙</button>
        </div>
        <button class="top-btn kids-mode-btn" id="kidsBtn" onclick="toggleKids()">👶 מצב ילדים: כבוי</button>
    </div>

    <h1 id="mainTitle" style="text-align:center; margin:0 0 20px 0;">ניהול רשימות heb2ing</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה..." onkeyup="filter()">
        
        <div class="filter-group">
            <div class="filter-label" id="l_type">סוג תוכן:</div>
            <div class="filter-options">
                <button class="f-btn active" id="type_all" onclick="setType('all')">הכל</button>
                <button class="f-btn" id="type_word" onclick="setType('word')">מילים</button>
                <button class="f-btn" id="type_sent_he" onclick="setType('sent_he')">משפט בעברית</button>
                <button class="f-btn" id="type_sent_en" onclick="setType('sent_en')">משפט באנגלית</button>
                <button class="f-btn" id="type_sent_both" onclick="setType('sent_both')">משפט בשניהם</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label" id="l_pos_he">חלק דיבור (עברית):</div>
            <div class="filter-options" id="posHeContainer">
                <button class="f-btn pos-he active" id="he_pos_all" onclick="togglePosHe('all', this)">הכל</button>
                <button class="f-btn pos-he" id="he_pos_noun" onclick="togglePosHe('שם עצם', this)">שם עצם</button>
                <button class="f-btn pos-he" id="he_pos_adj" onclick="togglePosHe('שם תואר', this)">שם תואר</button>
                <button class="f-btn pos-he" id="he_pos_verb" onclick="togglePosHe('פועל', this)">פועל</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label" id="l_pos_en">חלק דיבור (אנגלית):</div>
            <div class="filter-options" id="posEnContainer">
                <button class="f-btn pos-en active" id="en_pos_all" onclick="togglePosEn('all', this)">הכל</button>
                <button class="f-btn pos-en" id="en_pos_noun" onclick="togglePosEn('שם עצם', this)">שם עצם</button>
                <button class="f-btn pos-en" id="en_pos_adj" onclick="togglePosEn('שם תואר', this)">שם תואר</button>
                <button class="f-btn pos-en" id="en_pos_verb" onclick="togglePosEn('פועל', this)">פועל</button>
            </div>
        </div>
    </div>

    <div class="tabs" id="mainTabs">
        <button class="tab-btn active" onclick="showTab('A', this)" id="tA">רשימה א'</button>
        <button class="tab-btn" onclick="showTab('B', this)" id="tB">רשימה ב'</button>
        <button class="tab-btn" onclick="showTab('C', this)" id="tC">רשימה ג'</button>
        <button class="tab-btn" onclick="showTab('ALL', this)" id="tAll">הכל</button>
    </div>

    <div id="contentArea"></div>
    <div id="noResults" class="no-results">לא נמצאו תוצאות</div>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    let rawData = [];
    let state = {
        lang: 'he',
        kids: false,
        type: 'all',
        posHe: new Set(['all']),
        posEn: new Set(['all']),
        tab: 'A',
        sub: 'ALL'
    };

    const UI = {
        he: { title: "ניהול רשימות heb2ing", search: "חפש מילה...", type: "סוג תוכן:", posHe: "חלק דיבור (עברית):", posEn: "חלק דיבור (אנגלית):", tA: "רשימה א'", tB: "רשימה ב'", tC: "רשימה ג'", tAll: "הכל", kidsOff: "👶 מצב ילדים: כבוי", kidsOn: "👶 מצב ילדים: פעיל", all: "הכל", word: "מילים", sentHe: "משפט בעברית", sentEn: "משפט באנגלית", sentBoth: "משפט בשניהם", noun: "שם עצם", adj: "שם תואר", verb: "פועל", allStars: "כל הכוכבים" },
        en: { title: "heb2ing Lists", search: "Search word...", type: "Content Type:", posHe: "POS (Hebrew):", posEn: "POS (English):", tA: "List A", tB: "List B", tC: "List C", tAll: "All", kidsOff: "👶 Kids Mode: OFF", kidsOn: "👶 Kids Mode: ON", all: "All", word: "Words", sentHe: "Sentence (He)", sentEn: "Sentence (En)", sentBoth: "Sentence (Both)", noun: "Noun", adj: "Adjective", verb: "Verb", allStars: "All Stars" }
    };

    async function load() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            rawData = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                const pos = (c[4] || "").split(',');
                const he = c[0] || '';
                const en = c[1] || '';
                return {
                    he: he, en: en,
                    list: (c[2] || 'א').includes('א') ? 'A' : (c[2] || 'ב').includes('ב') ? 'B' : 'C',
                    stars: c[3] || '3',
                    posHe: (pos[0] || "").trim(),
                    posEn: (pos[1] || "").trim(),
                    hasSpaceHe: he.includes(' '),
                    hasSpaceEn: en.includes(' '),
                    profane: ['shit','fuck','bitch','ass','damn','dick','pussy'].some(w => (he+en).toLowerCase().includes(w))
                };
            }).filter(i => i.he);
            renderStructure();
            filter();
        } catch (e) { console.error(e); }
    }

    function renderStructure() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        ['A', 'B', 'C', 'ALL'].forEach(l => {
            const div = document.createElement('div');
            div.id = `tab${l}`;
            div.className = `tab-content ${state.tab === l ? 'active' : ''}`;
            
            const subTabs = `<div class="sub-tabs">
                <button class="sub-btn" onclick="showSub('${l}', '1', this)">★ 1</button>
                <button class="sub-btn" onclick="showSub('${l}', '2', this)">★★ 2</button>
                <button class="sub-btn" onclick="showSub('${l}', '3', this)">★★★ 3</button>
                <button class="sub-btn active" id="sub_all_${l}" onclick="showSub('${l}', 'ALL', this)">כל הכוכבים</button>
            </div>`;
            
            const contents = `<div id="sub${l}1" class="sub-content"><table><tbody></tbody></table></div>
                              <div id="sub${l}2" class="sub-content"><table><tbody></tbody></table></div>
                              <div id="sub${l}3" class="sub-content"><table><tbody></tbody></table></div>
                              <div id="sub${l}ALL" class="sub-content active"><table><tbody></tbody></table></div>`;
            
            div.innerHTML = subTabs + contents;
            area.appendChild(div);
        });
        fillTables();
    }

    function fillTables() {
        rawData.sort((a,b) => a.he.localeCompare(b.he, 'he')).forEach(item => {
            const targets = [`${item.list}ALL`, `${item.list}${item.stars}`, `ALLALL`, `ALL${item.stars}`];
            targets.forEach(t => {
                const tbody = document.querySelector(`#sub${t} tbody`);
                if (!tbody) return;
                const tr = document.createElement('tr');
                tr.className = 'item-row';
                tr.dataset.spaceHe = item.hasSpaceHe;
                tr.dataset.spaceEn = item.hasSpaceEn;
                tr.dataset.posHe = item.posHe;
                tr.dataset.posEn = item.posEn;
                tr.dataset.profane = item.profane;
                tr.innerHTML = `<td>${item.he}<span class="tag">${item.posHe}</span></td><td>${item.en}<span class="tag">${item.posEn}</span></td>`;
                tbody.appendChild(tr);
            });
        });
    }

    function filter() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let visibleCount = 0;
        
        document.querySelectorAll('.item-row').forEach(row => {
            const isVisibleSub = row.closest('.sub-content').classList.contains('active');
            if (!isVisibleSub) return;

            // סינון חיפוש
            const matchSearch = row.innerText.toLowerCase().includes(q);
            
            // סינון מצב ילדים - אם דלוק, אסור שיהיה profane
            if (state.kids && row.dataset.profane === 'true') {
                row.style.display = 'none';
                return;
            }

            // סינון סוג תוכן
            let matchType = false;
            const spHe = row.dataset.spaceHe === 'true';
            const spEn = row.dataset.spaceEn === 'true';
            if (state.type === 'all') matchType = true;
            else if (state.type === 'word' && !spHe && !spEn) matchType = true;
            else if (state.type === 'sent_he' && spHe) matchType = true;
            else if (state.type === 'sent_en' && spEn) matchType = true;
            else if (state.type === 'sent_both' && spHe && spEn) matchType = true;
            
            // סינון חלקי דיבור
            const matchPosHe = state.posHe.has('all') || [...state.posHe].some(p => row.dataset.posHe.includes(p));
            const matchPosEn = state.posEn.has('all') || [...state.posEn].some(p => row.dataset.posEn.includes(p));

            if (matchSearch && matchType && matchPosHe && matchPosEn) {
                row.style.display = '';
                visibleCount++;
            } else {
                row.style.display = 'none';
            }
        });
        document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
    }

    function toggleLang() {
        state.lang = state.lang === 'he' ? 'en' : 'he';
        const s = UI[state.lang];
        document.getElementById('mainHtml').dir = state.lang === 'he' ? 'rtl' : 'ltr';
        document.getElementById('langBtn').innerText = state.lang === 'he' ? 'English' : 'עברית';
        document.getElementById('mainTitle').innerText = s.title;
        document.getElementById('searchInput').placeholder = s.search;
        document.getElementById('l_type').innerText = s.type;
        document.getElementById('l_pos_he').innerText = s.posHe;
        document.getElementById('l_pos_en').innerText = s.posEn;
        document.getElementById('tA').innerText = s.tA;
        document.getElementById('tB').innerText = s.tB;
        document.getElementById('tC').innerText = s.tC;
        document.getElementById('tAll').innerText = s.tAll;
        
        // עדכון טקסט כפתורי סינון לפי ID כדי שלא יזוזו
        document.getElementById('type_all').innerText = s.all;
        document.getElementById('type_word').innerText = s.word;
        document.getElementById('type_sent_he').innerText = s.sentHe;
        document.getElementById('type_sent_en').innerText = s.sentEn;
        document.getElementById('type_sent_both').innerText = s.sentBoth;

        document.getElementById('he_pos_all').innerText = s.all;
        document.getElementById('he_pos_noun').innerText = s.noun;
        document.getElementById('he_pos_adj').innerText = s.adj;
        document.getElementById('he_pos_verb').innerText = s.verb;

        document.getElementById('en_pos_all').innerText = s.all;
        document.getElementById('en_pos_noun').innerText = s.noun;
        document.getElementById('en_pos_adj').innerText = s.adj;
        document.getElementById('en_pos_verb').innerText = s.verb;

        document.querySelectorAll('[id^="sub_all_"]').forEach(btn => btn.innerText = s.allStars);
        
        document.getElementById('kidsBtn').innerText = state.kids ? s.kidsOn : s.kidsOff;
        filter();
    }

    function toggleKids() {
        state.kids = !state.kids;
        const s = UI[state.lang];
        document.getElementById('kidsBtn').innerText = state.kids ? s.kidsOn : s.kidsOff;
        document.getElementById('kidsBtn').classList.toggle('active');
        filter();
    }

    function setType(t) {
        state.type = t;
        document.querySelectorAll('.filter-group:nth-child(2) .f-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`type_${t}`).classList.add('active');
        filter();
    }

    function togglePosHe(val, btn) {
        if (val === 'all') {
            state.posHe = new Set(['all']);
        } else {
            state.posHe.delete('all');
            if (state.posHe.has(val)) state.posHe.delete(val);
            else state.posHe.add(val);
            if (state.posHe.size === 0) state.posHe.add('all');
        }
        document.querySelectorAll('.pos-he').forEach(b => {
            const bVal = b.id === 'he_pos_all' ? 'all' : 
                         b.id === 'he_pos_noun' ? 'שם עצם' :
                         b.id === 'he_pos_adj' ? 'שם תואר' : 'פועל';
            b.classList.toggle('active', state.posHe.has(bVal));
        });
        filter();
    }

    function togglePosEn(val, btn) {
        if (val === 'all') {
            state.posEn = new Set(['all']);
        } else {
            state.posEn.delete('all');
            if (state.posEn.has(val)) state.posEn.delete(val);
            else state.posEn.add(val);
            if (state.posEn.size === 0) state.posEn.add('all');
        }
        document.querySelectorAll('.pos-en').forEach(b => {
            const bVal = b.id === 'en_pos_all' ? 'all' : 
                         b.id === 'en_pos_noun' ? 'שם עצם' :
                         b.id === 'en_pos_adj' ? 'שם תואר' : 'פועל';
            b.classList.toggle('active', state.posEn.has(bVal));
        });
        filter();
    }

    function showTab(l, btn) {
        state.tab = l;
        document.querySelectorAll('.tab-btn, .tab-content').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab${l}`).classList.add('active');
        filter();
    }

    function showSub(l, s, btn) {
        state.sub = s;
        const parent = document.getElementById(`tab${l}`);
        parent.querySelectorAll('.sub-btn, .sub-content').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`sub${l}${s}`).classList.add('active');
        filter();
    }

    function toggleDark() { document.body.classList.toggle('dark-mode'); }

    load();
</script>

</body>
</html>
