<!DOCTYPE html>
<html dir="rtl" lang="he" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>heb2ing - ניהול רשימות</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --tab-bg: #e0e0e0;
            --primary-blue: #1a73e8;
            --kids-pink: #ff6b6b;
            --accent-green: #34a853;
            --accent-purple: #9c27b0;
        }

        .dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --tab-bg: #333333;
            --primary-blue: #8ab4f8;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .top-btn { padding: 8px 16px; cursor: pointer; border-radius: 20px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); font-weight: bold; transition: 0.2s; }
        .top-btn:hover { background: var(--primary-blue); color: white; }
        .kids-mode-btn.active { background: var(--kids-pink); border-color: var(--kids-pink); color: white; }

        .controls { display: flex; flex-direction: column; gap: 15px; background: var(--bg-color); padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .search-box { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 25px; border: 1px solid var(--border-color); font-size: 16px; outline: none; }
        
        .filter-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .filter-label { font-weight: bold; font-size: 0.9em; color: var(--primary-blue); }
        .filter-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; width: 100%; max-width: 700px; }
        
        .f-btn { padding: 8px; border: 1px solid var(--border-color); background: var(--container-bg); border-radius: 15px; cursor: pointer; font-size: 13px; color: var(--text-color); transition: 0.2s; text-align: center; }
        .f-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        .pos-he.active { background: var(--accent-green); border-color: var(--accent-green); color: white; }
        .pos-en.active { background: var(--accent-purple); border-color: var(--accent-purple); color: white; }

        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 18px; cursor: pointer; border: none; background: var(--tab-bg); border-radius: 20px; font-weight: bold; color: var(--text-color); }
        .tab-btn.active { background: var(--primary-blue); color: white; }
        
        .sub-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 15px; }
        .sub-btn { padding: 5px 12px; cursor: pointer; border: 1px solid var(--border-color); background: transparent; border-radius: 10px; font-size: 13px; color: var(--text-color); }
        .sub-btn.active { background: #fbbc05; border-color: #fbbc05; color: black; font-weight: bold; }
        .btn-all-stars { order: 10; }

        .tab-content, .sub-content { display: none; }
        .tab-content.active, .sub-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; background: var(--container-bg); }
        td { border: 1px solid var(--border-color); padding: 12px; text-align: center; width: 50%; }
        
        /* חוצץ אותיות ממורכז */
        .letter-divider { background: var(--tab-bg); font-weight: bold; color: var(--primary-blue); text-align: center; padding: 8px; border: 1px solid var(--border-color); font-size: 1.2em; }
        .tag { font-size: 0.75em; color: #888; display: block; margin-top: 4px; }
        .no-results { text-align: center; padding: 30px; color: #888; display: none; }

        [data-lang-content] { display: none; }
        html[lang="he"] [data-lang-content="he"] { display: inline; }
        html[lang="en"] [data-lang-content="en"] { display: inline; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div>
            <button class="top-btn" onclick="toggleLang()">
                <span data-lang-content="he">English</span>
                <span data-lang-content="en">עברית</span>
            </button>
            <button class="top-btn" onclick="toggleDark()">🌙</button>
            <button class="top-btn" id="sortBtn" onclick="toggleSort()">
                <span data-lang-content="he">מיין לפי: אנגלית</span>
                <span data-lang-content="en">Sort by: Hebrew</span>
            </button>
        </div>
        <button class="top-btn kids-mode-btn" id="kidsBtn" onclick="toggleKids()">
            <span data-lang-content="he" id="kidsTextHe">👶 מצב ילדים: כבוי</span>
            <span data-lang-content="en" id="kidsTextEn">👶 Kids Mode: OFF</span>
        </button>
    </div>

    <h1 style="text-align:center; margin:0 0 20px 0;">
        <span data-lang-content="he">ניהול רשימות heb2ing</span>
        <span data-lang-content="en">heb2ing List Management</span>
    </h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה..." onkeyup="filter()">
        
        <div class="filter-group">
            <div class="filter-label">
                <span data-lang-content="he">סוג תוכן:</span>
                <span data-lang-content="en">Content Type:</span>
            </div>
            <div class="filter-options" id="typeContainer">
                <button class="f-btn active" id="type_all" onclick="toggleType('all', this)">
                    <span data-lang-content="he">הכל</span><span data-lang-content="en">All</span>
                </button>
                <button class="f-btn" id="type_word" onclick="toggleType('word', this)">
                    <span data-lang-content="he">מילים</span><span data-lang-content="en">Words</span>
                </button>
                <button class="f-btn" id="type_sent_he" onclick="toggleType('sent_he', this)">
                    <span data-lang-content="he">משפט בעברית</span><span data-lang-content="en">Sentence (He)</span>
                </button>
                <button class="f-btn" id="type_sent_en" onclick="toggleType('sent_en', this)">
                    <span data-lang-content="he">משפט באנגלית</span><span data-lang-content="en">Sentence (En)</span>
                </button>
                <button class="f-btn" id="type_sent_both" onclick="toggleType('sent_both', this)">
                    <span data-lang-content="he">משפט בשניהם</span><span data-lang-content="en">Sentence (Both)</span>
                </button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">
                <span data-lang-content="he">חלק דיבור (עברית):</span>
                <span data-lang-content="en">POS (Hebrew):</span>
            </div>
            <div class="filter-options">
                <button class="f-btn pos-he active" id="he_pos_all" onclick="togglePosHe('all', this)">
                    <span data-lang-content="he">הכל</span><span data-lang-content="en">All</span>
                </button>
                <button class="f-btn pos-he" id="he_pos_noun" onclick="togglePosHe('שם עצם', this)">
                    <span data-lang-content="he">שם עצם</span><span data-lang-content="en">Noun</span>
                </button>
                <button class="f-btn pos-he" id="he_pos_adj" onclick="togglePosHe('שם תואר', this)">
                    <span data-lang-content="he">שם תואר</span><span data-lang-content="en">Adjective</span>
                </button>
                <button class="f-btn pos-he" id="he_pos_verb" onclick="togglePosHe('פועל', this)">
                    <span data-lang-content="he">פועל</span><span data-lang-content="en">Verb</span>
                </button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label">
                <span data-lang-content="he">חלק דיבור (אנגלית):</span>
                <span data-lang-content="en">POS (English):</span>
            </div>
            <div class="filter-options">
                <button class="f-btn pos-en active" id="en_pos_all" onclick="togglePosEn('all', this)">
                    <span data-lang-content="he">הכל</span><span data-lang-content="en">All</span>
                </button>
                <button class="f-btn pos-en" id="en_pos_noun" onclick="togglePosEn('שם עצם', this)">
                    <span data-lang-content="he">שם עצם</span><span data-lang-content="en">Noun</span>
                </button>
                <button class="f-btn pos-en" id="en_pos_adj" onclick="togglePosEn('שם תואר', this)">
                    <span data-lang-content="he">שם תואר</span><span data-lang-content="en">Adjective</span>
                </button>
                <button class="f-btn pos-en" id="en_pos_verb" onclick="togglePosEn('פועל', this)">
                    <span data-lang-content="he">פועל</span><span data-lang-content="en">Verb</span>
                </button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('A', this)">
            <span data-lang-content="he">רשימה א'</span><span data-lang-content="en">List A</span>
        </button>
        <button class="tab-btn" onclick="showTab('B', this)">
            <span data-lang-content="he">רשימה ב'</span><span data-lang-content="en">List B</span>
        </button>
        <button class="tab-btn" onclick="showTab('C', this)">
            <span data-lang-content="he">רשימה ג'</span><span data-lang-content="en">List C</span>
        </button>
        <button class="tab-btn" onclick="showTab('ALL', this)">
            <span data-lang-content="he">הכל</span><span data-lang-content="en">All</span>
        </button>
    </div>

    <div id="contentArea"></div>
    <div id="noResults" class="no-results">לא נמצאו תוצאות</div>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    const BANNED = ['shit','fuck','bitch','ass','damn','dick','pussy','nigger','nigga','faggot','bastard','slut','whore'];

    let rawData = [];
    let state = {
        lang: 'he',
        kids: false,
        sortBy: 'he', // 'he' or 'en'
        types: new Set(['all']),
        posHe: new Set(['all']),
        posEn: new Set(['all']),
        tab: 'A',
        sub: 'ALL'
    };

    async function load() {
        try {
            const res = await fetch(CSV_URL);
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            rawData = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                const pos = (c[4] || "").split(',');
                const he = c[0] || '';
                const en = c[1] || '';
                return {
                    he: he, en: en,
                    list: (c[2] || 'א').includes('א') ? 'A' : (c[2] || 'ב').includes('ב') ? 'B' : 'C',
                    stars: c[3] || '3',
                    posHe: (pos[0] || "").trim(),
                    posEn: (pos[1] || "").trim(),
                    hasSpaceHe: he.includes(' '),
                    hasSpaceEn: en.includes(' '),
                    isProfane: BANNED.some(w => (he + " " + en).toLowerCase().includes(w))
                };
            }).filter(i => i.he);
            renderAll();
        } catch (e) { console.error("Error:", e); }
    }

    function renderAll() {
        const area = document.getElementById('contentArea');
        area.innerHTML = '';
        
        // מיון הנתונים לפי המצב הנבחר
        const sorted = [...rawData].sort((a,b) => {
            return state.sortBy === 'he' ? a.he.localeCompare(b.he, 'he') : a.en.localeCompare(b.en, 'en');
        });

        ['A', 'B', 'C', 'ALL'].forEach(l => {
            const div = document.createElement('div');
            div.id = `tab${l}`;
            div.className = `tab-content ${state.tab === l ? 'active' : ''}`;
            
            let htmlTabs = `<div class="sub-tabs">`;
            ['1','2','3'].forEach(s => htmlTabs += `<button class="sub-btn ${state.sub === s ? 'active' : ''}" onclick="showSub('${l}', '${s}', this)">★ ${s}</button>`);
            htmlTabs += `<button class="sub-btn btn-all-stars ${state.sub === 'ALL' ? 'active' : ''}" onclick="showSub('${l}', 'ALL', this)"><span data-lang-content="he">כל הכוכבים</span><span data-lang-content="en">All Stars</span></button></div>`;
            
            let htmlContents = '';
            ['1','2','3','ALL'].forEach(sk => {
                htmlContents += `<div id="sub${l}${sk}" class="sub-content ${state.sub === sk ? 'active' : ''}"><table><tbody>`;
                let lastChar = '';
                sorted.forEach(item => {
                    if ((l === 'ALL' || item.list === l) && (sk === 'ALL' || item.stars === sk)) {
                        const currentChar = state.sortBy === 'he' ? item.he.trim().charAt(0) : item.en.trim().charAt(0).toUpperCase();
                        if (currentChar !== lastChar) {
                            htmlContents += `<tr class="letter-row"><td colspan="2" class="letter-divider">${currentChar}</td></tr>`;
                            lastChar = currentChar;
                        }
                        htmlContents += `<tr class="item-row" data-space-he="${item.hasSpaceHe}" data-space-en="${item.hasSpaceEn}" data-pos-he="${item.posHe}" data-pos-en="${item.posEn}" data-profane="${item.isProfane}">
                            <td>${item.he}<span class="tag">${item.posHe}</span></td><td>${item.en}<span class="tag">${item.posEn}</span></td></tr>`;
                    }
                });
                htmlContents += `</tbody></table></div>`;
            });
            
            div.innerHTML = htmlTabs + htmlContents;
            area.appendChild(div);
        });
        filter();
    }

    function filter() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let visibleCount = 0;
        
        document.querySelectorAll('.sub-content.active .item-row').forEach(row => {
            if (state.kids && row.dataset.profane === 'true') { row.style.display = 'none'; return; }

            const spHe = row.dataset.spaceHe === 'true';
            const spEn = row.dataset.spaceEn === 'true';
            let matchType = state.types.has('all');
            if (!matchType) {
                if (state.types.has('word') && !spHe && !spEn) matchType = true;
                if (state.types.has('sent_he') && spHe) matchType = true;
                if (state.types.has('sent_en') && spEn) matchType = true;
                if (state.types.has('sent_both') && spHe && spEn) matchType = true;
            }
            
            const matchPosHe = state.posHe.has('all') || [...state.posHe].some(p => row.dataset.posHe.includes(p));
            const matchPosEn = state.posEn.has('all') || [...state.posEn].some(p => row.dataset.posEn.includes(p));
            const matchSearch = row.innerText.toLowerCase().includes(q);

            if (matchSearch && matchType && matchPosHe && matchPosEn) {
                row.style.display = '';
                visibleCount++;
            } else { row.style.display = 'none'; }
        });

        document.querySelectorAll('.sub-content.active .letter-row').forEach(lRow => {
            let next = lRow.nextElementSibling;
            let hasVisible = false;
            while(next && next.classList.contains('item-row')) {
                if(next.style.display !== 'none') { hasVisible = true; break; }
                next = next.nextElementSibling;
            }
            lRow.style.display = hasVisible ? '' : 'none';
        });
        document.getElementById('noResults').style.display = visibleCount === 0 ? 'block' : 'none';
    }

    function toggleSort() {
        state.sortBy = state.sortBy === 'he' ? 'en' : 'he';
        renderAll();
    }

    function toggleType(val, btn) {
        if (val === 'all') state.types = new Set(['all']);
        else {
            state.types.delete('all');
            state.types.has(val) ? state.types.delete(val) : state.types.add(val);
            if (state.types.size === 0) state.types.add('all');
        }
        document.querySelectorAll('#typeContainer .f-btn').forEach(b => b.classList.toggle('active', state.types.has(b.id.replace('type_',''))));
        filter();
    }

    function togglePosHe(val, btn) {
        if (val === 'all') state.posHe = new Set(['all']);
        else {
            state.posHe.delete('all');
            state.posHe.has(val) ? state.posHe.delete(val) : state.posHe.add(val);
            if (state.posHe.size === 0) state.posHe.add('all');
        }
        document.querySelectorAll('.pos-he').forEach(b => {
            const bVal = b.id === 'he_pos_all' ? 'all' : (b.id === 'he_pos_noun' ? 'שם עצם' : (b.id === 'he_pos_adj' ? 'שם תואר' : 'פועל'));
            b.classList.toggle('active', state.posHe.has(bVal));
        });
        filter();
    }

    function togglePosEn(val, btn) {
        if (val === 'all') state.posEn = new Set(['all']);
        else {
            state.posEn.delete('all');
            state.posEn.has(val) ? state.posEn.delete(val) : state.posEn.add(val);
            if (state.posEn.size === 0) state.posEn.add('all');
        }
        document.querySelectorAll('.pos-en').forEach(b => {
            const bVal = b.id === 'en_pos_all' ? 'all' : (b.id === 'en_pos_noun' ? 'שם עצם' : (b.id === 'en_pos_adj' ? 'שם תואר' : 'פועל'));
            b.classList.toggle('active', state.posEn.has(bVal));
        });
        filter();
    }

    function toggleLang() {
        state.lang = state.lang === 'he' ? 'en' : 'he';
        document.getElementById('mainHtml').lang = state.lang;
        document.getElementById('mainHtml').dir = state.lang === 'he' ? 'rtl' : 'ltr';
        filter();
    }

    function toggleKids() {
        state.kids = !state.kids;
        document.getElementById('kidsBtn').classList.toggle('active');
        document.getElementById('kidsTextHe').innerText = state.kids ? "👶 מצב ילדים: פעיל" : "👶 מצב ילדים: כבוי";
        document.getElementById('kidsTextEn').innerText = state.kids ? "👶 Kids Mode: ON" : "👶 Kids Mode: OFF";
        filter();
    }

    function showTab(l, btn) {
        state.tab = l;
        document.querySelectorAll('.tab-btn, .tab-content').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab${l}`).classList.add('active');
        filter();
    }

    function showSub(l, s, btn) {
        state.sub = s;
        document.querySelectorAll('.sub-btn, .sub-content').forEach(x => x.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`sub${l}${s}`).classList.add('active');
        filter();
    }

    function toggleDark() { document.body.classList.toggle('dark-mode'); }

    load();
</script>
</body>
</html>
