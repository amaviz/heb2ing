<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - heb2ing</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .controls { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .search-area { width: 100%; max-width: 400px; display: flex; gap: 5px; align-items: center; }
        .search-box { flex-grow: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; outline: none; }
        
        .filter-options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .filter-btn { padding: 6px 12px; border: 1px solid #1a73e8; background: white; color: #1a73e8; border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        .filter-btn.active { background: #1a73e8; color: white; }

        .tabs, .sub-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button, .sub-tab-button { padding: 10px 20px; cursor: pointer; border: none; background: #e0e0e0; border-radius: 25px; font-weight: bold; transition: 0.3s; font-size: 15px; }
        .tab-button.active { background: #1a73e8; color: white; }
        .sub-tab-button.active { background: #fbbc05; color: black; }
        
        .sub-tabs { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .tab-content, .sub-tab-content { display: none; }
        .tab-content.active, .sub-tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .letter-divider { background-color: #e8f0fe; font-weight: bold; font-size: 1.2em; color: #1a73e8; padding: 8px 20px !important; }
        
        .info-tag { font-size: 0.75em; color: #777; display: block; margin-top: 3px; font-weight: normal; min-height: 1em; }
        .loading-msg, .no-results { text-align: center; font-weight: bold; padding: 20px; color: #666; }
        .no-results { color: #d93025; font-size: 1.2em; display: none; }
        
        .form-container { margin-top: 40px; border-top: 2px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול רשימות heb2ing</h1>

    <div class="controls">
        <div class="search-area">
            <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה ברשימה זו..." onkeyup="filterTables()">
        </div>
        
        <div class="filter-options">
            <button class="filter-btn active" onclick="setWordFilter('all', this)">הכל</button>
            <button class="filter-btn" onclick="setWordFilter('word_only', this)">מילים בודדות</button>
            <button class="filter-btn" onclick="setWordFilter('sent_he', this)">משפט בעברית</button>
            <button class="filter-btn" onclick="setWordFilter('sent_en', this)">משפט באנגלית</button>
            <button class="filter-btn" onclick="setWordFilter('sent_both', this)">משפט בשניהם</button>
        </div>

        <div class="sort-options">
            <label><input type="radio" name="sortOrder" value="he" checked onclick="currentSort='he'; renderAll();"> א"ב עברי</label>
            <label><input type="radio" name="sortOrder" value="en" onclick="currentSort='en'; renderAll();"> A-Z (אנגלי)</label>
        </div>
    </div>

    <div id="navigation-wrapper">
        <div class="tabs">
            <button class="tab-button active" onclick="openTab(event, 'listA')">רשימה א'</button>
            <button class="tab-button" onclick="openTab(event, 'listB')">רשימה ב'</button>
            <button class="tab-button" onclick="openTab(event, 'listC')">רשימה ג'</button>
            <button class="tab-button" onclick="openTab(event, 'listALL')">כל המילים</button>
        </div>

        <div id="listA" class="tab-content active">
            <div class="sub-tabs">
                <button class="sub-tab-button" onclick="openSubTab(event, 'A1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'A2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'A3')">★★★ 3</button>
                <button class="sub-tab-button active" onclick="openSubTab(event, 'A_ALL')">הכל</button>
            </div>
            <div id="A1" class="sub-tab-content"><table id="tableA1"><tbody></tbody></table></div>
            <div id="A2" class="sub-tab-content"><table id="tableA2"><tbody></tbody></table></div>
            <div id="A3" class="sub-tab-content"><table id="tableA3"><tbody></tbody></table></div>
            <div id="A_ALL" class="sub-tab-content active"><table id="tableA_ALL"><tbody></tbody></table></div>
        </div>

        <div id="listB" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-tab-button" onclick="openSubTab(event, 'B1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'B2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'B3')">★★★ 3</button>
                <button class="sub-tab-button active" onclick="openSubTab(event, 'B_ALL')">הכל</button>
            </div>
            <div id="B1" class="sub-tab-content"><table id="tableB1"><tbody></tbody></table></div>
            <div id="B2" class="sub-tab-content"><table id="tableB2"><tbody></tbody></table></div>
            <div id="B3" class="sub-tab-content"><table id="tableB3"><tbody></tbody></table></div>
            <div id="B_ALL" class="sub-tab-content active"><table id="tableB_ALL"><tbody></tbody></table></div>
        </div>

        <div id="listC" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-tab-button" onclick="openSubTab(event, 'C1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'C2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'C3')">★★★ 3</button>
                <button class="sub-tab-button active" onclick="openSubTab(event, 'C_ALL')">הכל</button>
            </div>
            <div id="C1" class="sub-tab-content"><table id="tableC1"><tbody></tbody></table></div>
            <div id="C2" class="sub-tab-content"><table id="tableC2"><tbody></tbody></table></div>
            <div id="C3" class="sub-tab-content"><table id="tableC3"><tbody></tbody></table></div>
            <div id="C_ALL" class="sub-tab-content active"><table id="tableC_ALL"><tbody></tbody></table></div>
        </div>

        <div id="listALL" class="tab-content">
            <div class="sub-tabs">
                <button class="sub-tab-button" onclick="openSubTab(event, 'ALL1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'ALL2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, 'ALL3')">★★★ 3</button>
                <button class="sub-tab-button active" onclick="openSubTab(event, 'GlobalALL')">הכל</button>
            </div>
            <div id="ALL1" class="sub-tab-content"><table id="tableALL1"><tbody></tbody></table></div>
            <div id="ALL2" class="sub-tab-content"><table id="tableALL2"><tbody></tbody></table></div>
            <div id="ALL3" class="sub-tab-content"><table id="tableALL3"><tbody></tbody></table></div>
            <div id="GlobalALL" class="sub-tab-content active"><table id="tableGlobalALL"><tbody></tbody></table></div>
        </div>
    </div>

    <div id="loading" class="loading-msg">טוען נתונים...</div>
    <div id="noResults" class="no-results">לא נמצאה מילה מתאימה</div>

    <div class="form-container">
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1Lj23HKtXMkp1sOJ_pE3xluNmWhdNFU7z9JVg5BiAPsLiFg/viewform?embedded=true" width="100%" height="800" frameborder="0">טוען...</iframe>
    </div>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    let allData = [];
    let currentSort = 'he';
    let wordFilter = 'all'; 

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                let rawType = cols[2] ? cols[2].replace('רשימה ', '').trim() : 'א';
                let mappedType = rawType === 'א' ? 'A' : (rawType === 'ב' ? 'B' : 'C');
                
                return { 
                    he: cols[0] || '', 
                    en: cols[1] || '', 
                    type: mappedType, rawHeb: rawType, stars: cols[3] || '3',
                    hasSpaceHe: cols[0].trim().includes(' '),
                    hasSpaceEn: cols[1].trim().includes(' ')
                };
            }).filter(item => item.he !== '');
            document.getElementById('loading').style.display = 'none';
            renderAll();
        } catch (e) { document.getElementById('loading').innerText = "שגיאה בטעינה."; }
    }

    function setWordFilter(type, btn) {
        wordFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterTables();
    }

    function renderAll() {
        const tableIds = ['A1','A2','A3','A_ALL','B1','B2','B3','B_ALL','C1','C2','C3','C_ALL','ALL1','ALL2','ALL3','GlobalALL'];
        tableIds.forEach(id => { const el = document.querySelector(`#table${id} tbody`); if(el) el.innerHTML = ''; });

        let sorted = [...allData].sort((a, b) => a[currentSort].localeCompare(b[currentSort], currentSort === 'he' ? 'he' : 'en'));
        let lastLetters = {};

        sorted.forEach(item => {
            const keys = [item.type + item.stars, item.type + '_ALL', 'ALL' + item.stars, 'GlobalALL'];
            keys.forEach(key => {
                const tbody = document.querySelector(`#table${key} tbody`);
                if (!tbody) return;

                const firstLetter = item[currentSort].charAt(0).toUpperCase();
                if (lastLetters[key] !== firstLetter) {
                    const div = document.createElement('tr');
                    div.className = 'letter-row';
                    div.setAttribute('data-letter', firstLetter);
                    div.innerHTML = `<td colspan="2" class="letter-divider ${currentSort === 'he' ? 'text-right' : 'text-left'}">${firstLetter}</td>`;
                    tbody.appendChild(div);
                    lastLetters[key] = firstLetter;
                }

                const tr = document.createElement('tr');
                tr.className = 'data-row';
                tr.setAttribute('data-parent-id', key);
                tr.setAttribute('data-space-he', item.hasSpaceHe);
                tr.setAttribute('data-space-en', item.hasSpaceEn);
                tr.setAttribute('data-heb-type', item.rawHeb);
                tr.setAttribute('data-stars', item.stars);
                tr.setAttribute('data-belongs-to-letter', firstLetter);
                
                tr.innerHTML = `<td><span class="word-text">${item.he}</span><span class="info-tag"></span></td><td>${item.en}</td>`;
                tbody.appendChild(tr);
            });
        });
        filterTables();
    }

    function filterTables() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const activeSubTab = document.querySelector('.tab-content.active .sub-tab-content.active');
        let currentVisibleId = activeSubTab ? activeSubTab.id : "";
        let visibleRowsCount = 0;

        // שלב 1: סינון שורות הנתונים
        document.querySelectorAll(".data-row").forEach(r => {
            const wordText = r.querySelector('.word-text').innerText.toLowerCase();
            const translationText = r.cells[1].innerText.toLowerCase();
            const rowParentId = r.getAttribute('data-parent-id');
            const spaceHe = r.getAttribute('data-space-he') === 'true';
            const spaceEn = r.getAttribute('data-space-en') === 'true';
            
            const matchesSearch = wordText.includes(q) || translationText.includes(q);
            const isVisibleTable = (rowParentId === currentVisibleId);
            
            // לוגיקת כפתורי הסינון החדשה
            let matchesFilter = true;
            if (wordFilter === 'word_only') matchesFilter = (!spaceHe && !spaceEn);
            else if (wordFilter === 'sent_he') matchesFilter = spaceHe;
            else if (wordFilter === 'sent_en') matchesFilter = spaceEn;
            else if (wordFilter === 'sent_both') matchesFilter = (spaceHe && spaceEn);

            if (matchesSearch && isVisibleTable && matchesFilter) {
                r.style.display = "";
                visibleRowsCount++;
            } else {
                r.style.display = "none";
            }

            // תגיות מידע
            const infoTag = r.querySelector('.info-tag');
            const hebType = r.getAttribute('data-heb-type');
            const stars = r.getAttribute('data-stars');
            if (currentVisibleId === 'GlobalALL' || currentVisibleId.startsWith('ALL')) {
                infoTag.innerText = currentVisibleId === 'GlobalALL' ? `רשימה ${hebType} - ★${stars}` : `רשימה ${hebType}`;
            } else if (currentVisibleId.includes('_ALL')) {
                infoTag.innerText = `★${stars}`;
            } else {
                infoTag.innerText = "";
            }
        });
        
        // שלב 2: טיפול באותיות הגדולות - להעלים אם אין תחתיהן שורות גלויות
        document.querySelectorAll(".letter-row").forEach(letterRow => {
            const parentTableBody = letterRow.parentElement;
            const parentTableId = parentTableBody.parentElement.id.replace('table','');
            
            if (parentTableId !== currentVisibleId) {
                letterRow.style.display = "none";
                return;
            }

            // מחפשים אם יש שורה גלויה ששייכת לאות הזו
            const letter = letterRow.getAttribute('data-letter');
            const hasVisibleData = !!parentTableBody.querySelector(`.data-row[data-belongs-to-letter="${letter}"]:not([style*="display: none"])`);
            
            letterRow.style.display = hasVisibleData ? "" : "none";
        });

        document.getElementById('noResults').style.display = (visibleRowsCount === 0 && (q !== "" || wordFilter !== 'all')) ? "block" : "none";
    }

    function openTab(e, id) {
        document.querySelectorAll(".tab-content, .tab-button").forEach(x => x.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    function openSubTab(e, id) {
        const p = e.currentTarget.parentElement;
        p.querySelectorAll(".sub-tab-button").forEach(b => b.classList.remove("active"));
        p.parentElement.querySelectorAll(".sub-tab-content").forEach(t => t.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    fetchData();
</script>
</body>
</html>
