<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - heb2ing</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a73e8; }
        .controls { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .search-area { width: 100%; max-width: 600px; display: flex; gap: 5px; align-items: center; }
        .search-box { flex-grow: 1; padding: 10px 15px; border-radius: 20px 0 0 20px; border: 1px solid #ccc; font-size: 16px; outline: none; border-left: none; }
        .search-select { padding: 10px; border-radius: 0 20px 20px 0; border: 1px solid #ccc; background: #f8f9fa; cursor: pointer; font-size: 14px; outline: none; }
        .tabs, .sub-tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button, .sub-tab-button { padding: 10px 25px; cursor: pointer; border: none; background: #e0e0e0; border-radius: 25px; font-weight: bold; transition: 0.3s; font-size: 16px; }
        .tab-button.active { background: #1a73e8; color: white; }
        .sub-tabs { margin-top: 10px; border-top: 1px solid #eee; padding-top: 15px; }
        .sub-tab-button { font-size: 14px; padding: 8px 15px; background: #f0f0f0; color: #555; }
        .sub-tab-button.active { background: #fbbc05; color: black; }
        .tab-content, .sub-tab-content { display: none; }
        .tab-content.active, .sub-tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .letter-divider { background-color: #e8f0fe; font-weight: bold; font-size: 1.2em; color: #1a73e8; padding: 8px 20px !important; }
        .text-right { text-align: right; }
        .text-left { text-align: left; }
        .loading-msg { text-align: center; font-weight: bold; padding: 20px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול רשימות heb2ing</h1>

    <div class="controls">
        <div class="search-area">
            <select id="searchScope" class="search-select" onchange="filterTables()">
                <option value="all">חיפוש בכל המילים</option>
                <option value="current">חיפוש בדירוג הנוכחי</option>
            </select>
            <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה..." onkeyup="filterTables()">
        </div>
        <div class="sort-options">
            <span>מיין לפי:</span>
            <label><input type="radio" name="sortOrder" value="he" checked onclick="currentSort='he'; renderAll();"> א"ב עברי</label>
            <label><input type="radio" name="sortOrder" value="en" onclick="currentSort='en'; renderAll();"> A-Z (אנגלי)</label>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'listA')">רשימה א'</button>
        <button class="tab-button" onclick="openTab(event, 'listB')">רשימה ב'</button>
        <button class="tab-button" onclick="openTab(event, 'listC')">רשימה ג'</button>
    </div>

    <div id="listA" class="tab-content active">
        <div class="sub-tabs">
            <button class="sub-tab-button" onclick="openSubTab(event, 'A1')">★ 1</button>
            <button class="sub-tab-button" onclick="openSubTab(event, 'A2')">★★ 2</button>
            <button class="sub-tab-button active" onclick="openSubTab(event, 'A3')">★★★ 3</button>
        </div>
        <div id="A1" class="sub-tab-content"><table id="tableA1"><tbody></tbody></table></div>
        <div id="A2" class="sub-tab-content"><table id="tableA2"><tbody></tbody></table></div>
        <div id="A3" class="sub-tab-content active"><table id="tableA3"><tbody></tbody></table></div>
    </div>

    <div id="listB" class="tab-content">
        <div class="sub-tabs">
            <button class="sub-tab-button" onclick="openSubTab(event, 'B1')">★ 1</button>
            <button class="sub-tab-button" onclick="openSubTab(event, 'B2')">★★ 2</button>
            <button class="sub-tab-button active" onclick="openSubTab(event, 'B3')">★★★ 3</button>
        </div>
        <div id="B1" class="sub-tab-content"><table id="tableB1"><tbody></tbody></table></div>
        <div id="B2" class="sub-tab-content"><table id="tableB2"><tbody></tbody></table></div>
        <div id="B3" class="sub-tab-content active"><table id="tableB3"><tbody></tbody></table></div>
    </div>

    <div id="listC" class="tab-content">
        <div class="sub-tabs">
            <button class="sub-tab-button" onclick="openSubTab(event, 'C1')">★ 1</button>
            <button class="sub-tab-button" onclick="openSubTab(event, 'C2')">★★ 2</button>
            <button class="sub-tab-button active" onclick="openSubTab(event, 'C3')">★★★ 3</button>
        </div>
        <div id="C1" class="sub-tab-content"><table id="tableC1"><tbody></tbody></table></div>
        <div id="C2" class="sub-tab-content"><table id="tableC2"><tbody></tbody></table></div>
        <div id="C3" class="sub-tab-content active"><table id="tableC3"><tbody></tbody></table></div>
    </div>

    <div id="loading" class="loading-msg">טוען נתונים...</div>
    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd1Lj23HKtXMkp1sOJ_pE3xluNmWhdNFU7z9JVg5BiAPsLiFg/viewform?embedded=true" width="100%" height="500" frameborder="0" style="margin-top:30px;">בטעינה…</iframe>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    
    let allData = [];
    let currentSort = 'he';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allData = rows.map(row => {
                // פיצול שורה לפי פסיקים תוך טיפול בגרשיים
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                return { 
                    he: cols[0] || '', 
                    en: cols[1] || '', 
                    type: cols[2] ? cols[2].replace('רשימה ', '') : '', 
                    stars: cols[3] || '3' // אם ריק, ברירת מחדל 3
                };
            }).filter(item => item.he !== '');
            
            document.getElementById('loading').style.display = 'none';
            renderAll();
        } catch (e) {
            document.getElementById('loading').innerText = "שגיאה בחיבור לנתונים.";
        }
    }

    function renderAll() {
        const tableIds = ['A1','A2','A3','B1','B2','B3','C1','C2','C3'];
        tableIds.forEach(id => {
            const el = document.querySelector(`#table${id} tbody`);
            if(el) el.innerHTML = '';
        });

        let sorted = [...allData].sort((a, b) => a[currentSort].localeCompare(b[currentSort], currentSort === 'he' ? 'he' : 'en'));
        let lastLetters = {};

        sorted.forEach(item => {
            let tType = item.type === 'א' ? 'A' : (item.type === 'ב' ? 'B' : 'C');
            let tableKey = tType + item.stars;
            let tbody = document.querySelector(`#table${tableKey} tbody`);
            
            if (tbody) {
                const firstLetter = item[currentSort].charAt(0).toUpperCase();
                if (lastLetters[tableKey] !== firstLetter) {
                    const div = document.createElement('tr');
                    div.className = 'letter-row';
                    div.innerHTML = `<td colspan="2" class="letter-divider ${currentSort === 'he' ? 'text-right' : 'text-left'}">${firstLetter}</td>`;
                    tbody.appendChild(div);
                    lastLetters[tableKey] = firstLetter;
                }
                const tr = document.createElement('tr');
                tr.className = 'data-row';
                tr.setAttribute('data-id', tableKey);
                tr.innerHTML = `<td>${item.he}</td><td>${item.en}</td>`;
                tbody.appendChild(tr);
            }
        });
    }

    function openTab(e, id) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".tab-button").forEach(b => b.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    function openSubTab(e, id) {
        const p = e.currentTarget.parentElement;
        p.querySelectorAll(".sub-tab-button").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".sub-tab-content").forEach(t => {
            if(t.parentElement.id === p.parentElement.id) t.classList.remove("active");
        });
        document.getElementById(id).classList.add("active");
        e.currentTarget.classList.add("active");
        filterTables();
    }

    function filterTables() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const s = document.getElementById('searchScope').value;
        const activeId = document.querySelector('.tab-content.active .sub-tab-content.active').id;
        
        document.querySelectorAll(".data-row").forEach(r => {
            const matchesQ = r.innerText.toLowerCase().includes(q);
            const matchesS = (s === 'all' || r.getAttribute('data-id') === activeId);
            r.style.display = (matchesQ && matchesS) ? "" : "none";
        });
        document.querySelectorAll(".letter-row").forEach(d => d.style.display = q ? "none" : "");
    }

    fetchData();
</script>
</body>
</html>
