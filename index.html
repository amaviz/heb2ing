<!DOCTYPE html>
<html dir="rtl" lang="he" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול רשימות - heb2ing</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
            --tab-bg: #e0e0e0;
            --primary-blue: #1a73e8;
            --kids-pink: #ff6b6b;
            --accent-green: #34a853;
            --accent-orange: #fbbc05;
        }

        .dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --border-color: #444444;
            --tab-bg: #333333;
            --primary-blue: #8ab4f8;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; transition: 0.3s; }
        .container { max-width: 1000px; margin: auto; background: var(--container-bg); padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .top-btn { padding: 8px 15px; cursor: pointer; border-radius: 20px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); font-weight: bold; transition: 0.3s; }
        .top-btn:hover { background: var(--primary-blue); color: white; }
        
        .kids-mode-btn { border-color: var(--kids-pink); color: var(--kids-pink); }
        .kids-mode-btn.active { background: var(--kids-pink); color: white; }

        .controls { background: var(--container-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .search-box { width: 100%; max-width: 400px; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border-color); font-size: 16px; outline: none; background: var(--container-bg); color: var(--text-color); }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; align-items: center; width: 100%; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .filter-label { font-size: 0.9em; font-weight: bold; color: var(--primary-blue); margin-bottom: 5px; }
        .filter-options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        
        .filter-btn { padding: 6px 14px; border: 1px solid var(--primary-blue); background: transparent; color: var(--primary-blue); border-radius: 15px; cursor: pointer; font-size: 13px; transition: 0.2s; font-weight: 500; }
        .filter-btn.active { background: var(--primary-blue); color: white; }
        
        /* עיצוב שונה לחלקי הדיבור */
        .pos-he-btn.active { background: var(--accent-green); border-color: var(--accent-green); color: white; }
        .pos-en-btn.active { background: #9c27b0; border-color: #9c27b0; color: white; }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-button { padding: 10px 20px; cursor: pointer; border: none; background: var(--tab-bg); color: var(--text-color); border-radius: 25px; font-weight: bold; }
        .tab-button.active { background: var(--primary-blue); color: white; }
        
        .sub-tab-button { padding: 5px 15px; cursor: pointer; border: none; background: var(--tab-bg); border-radius: 15px; margin: 0 3px; }
        .sub-tab-button.active { background: var(--accent-orange); color: black; font-weight: bold; }

        .tab-content, .sub-tab-content { display: none; }
        .tab-content.active, .sub-tab-content.active { display: block; }
        
        table { width: 100%; border-collapse: collapse; }
        td { border: 1px solid var(--border-color); padding: 12px; text-align: center; }
        .letter-divider { background-color: rgba(26, 115, 232, 0.1); font-weight: bold; color: var(--primary-blue); }
        .info-tag { font-size: 0.7em; color: #888; display: block; margin-top: 4px; }
        .no-results { text-align: center; color: #d93025; padding: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <button class="top-btn" id="langBtn" onclick="toggleLanguage()">English</button>
        <button class="top-btn kids-mode-btn" id="kidsBtn" onclick="toggleKidsMode()">👶 מצב ילדים: כבוי</button>
        <button class="top-btn" onclick="toggleDarkMode()">🌙</button>
    </div>

    <h1 id="mainTitle" style="text-align:center; color:var(--primary-blue)">ניהול רשימות heb2ing</h1>

    <div class="controls">
        <input type="text" id="searchInput" class="search-box" placeholder="חפש מילה..." onkeyup="filterTables()">
        
        <div class="filter-group">
            <div class="filter-label" id="lbl_type">סוג תוכן:</div>
            <div class="filter-options">
                <button class="filter-btn active" id="btn_type_all" onclick="toggleTypeFilter('all', this)">הכל</button>
                <button class="filter-btn" onclick="toggleTypeFilter('word', this)">מילים</button>
                <button class="filter-btn" onclick="toggleTypeFilter('sent', this)">משפטים</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label" id="lbl_pos_he">חלק דיבור (עברית):</div>
            <div class="filter-options">
                <button class="filter-btn pos-he-btn active" id="btn_pos_he_all" onclick="togglePosHeFilter('all', this)">הכל</button>
                <button class="filter-btn pos-he-btn" onclick="togglePosHeFilter('שם עצם', this)">שם עצם</button>
                <button class="filter-btn pos-he-btn" onclick="togglePosHeFilter('שם תואר', this)">שם תואר</button>
                <button class="filter-btn pos-he-btn" onclick="togglePosHeFilter('פועל', this)">פועל</button>
            </div>
        </div>

        <div class="filter-group">
            <div class="filter-label" id="lbl_pos_en">חלק דיבור (אנגלית):</div>
            <div class="filter-options">
                <button class="filter-btn pos-en-btn active" id="btn_pos_en_all" onclick="togglePosEnFilter('all', this)">הכל</button>
                <button class="filter-btn pos-en-btn" onclick="togglePosEnFilter('שם עצם', this)">שם עצם</button>
                <button class="filter-btn pos-en-btn" onclick="togglePosEnFilter('שם תואר', this)">שם תואר</button>
                <button class="filter-btn pos-en-btn" onclick="togglePosEnFilter('פועל', this)">פועל</button>
            </div>
        </div>
    </div>

    <div class="tabs">
        <button class="tab-button active" onclick="openTab(event, 'listA')" id="tabA">רשימה א'</button>
        <button class="tab-button" onclick="openTab(event, 'listB')" id="tabB">רשימה ב'</button>
        <button class="tab-button" onclick="openTab(event, 'listC')" id="tabC">רשימה ג'</button>
        <button class="tab-button" onclick="openTab(event, 'listALL')" id="tabAll">הכל</button>
    </div>

    <div id="listA" class="tab-content active"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
    <div id="listB" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
    <div id="listC" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>
    <div id="listALL" class="tab-content"><div class="sub-tabs-container"></div><div class="sub-contents"></div></div>

    <div id="loading" style="text-align:center; padding:20px;">טוען נתונים...</div>
    <div id="noResults" class="no-results">לא נמצאו מילים תואמות</div>
</div>

<script>
    const SHEET_ID = '1D8mPNKBN12uzYOu7HYaxU7trInECv7k5jBl0GnugG3o';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
    const badWords = ['shit', 'fuck', 'bitch', 'ass', 'damn', 'nigger', 'nigga']; 

    let allData = [];
    let currentLang = 'he';
    let kidsMode = false;
    let selectedTypeFilter = 'all';
    let selectedPosHeFilter = 'all';
    let selectedPosEnFilter = 'all';

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            const rows = text.split('\n').slice(1);
            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                let rawList = cols[2] || 'א';
                let type = rawList.includes('א') ? 'A' : (rawList.includes('ב') ? 'B' : 'C');
                
                // טיפול בפורמט החדש: עמודה E מכילה "חלק דיבור עברית, חלק דיבור אנגלית"
                const posCol = (cols[4] || "").split(',');
                const posHe = (posCol[0] || "").trim();
                const posEn = (posCol[1] || "").trim();

                const content = (cols[0] + " " + cols[1]).toLowerCase();
                const isProfane = badWords.some(w => new RegExp(`\\b${w}\\b`, 'i').test(content));

                return { 
                    he: cols[0] || '', en: cols[1] || '', type: type, stars: cols[3] || '3',
                    posHe: posHe, posEn: posEn,
                    isSent: cols[0].includes(' ') || cols[1].includes(' '),
                    isProfane: isProfane
                };
            }).filter(i => i.he !== '');
            
            document.getElementById('loading').style.display = 'none';
            setupTabs();
            renderAll();
        } catch (e) { console.error(e); }
    }

    function setupTabs() {
        ['A', 'B', 'C', 'ALL'].forEach(l => {
            const container = document.querySelector(`#list${l} .sub-tabs-container`);
            const content = document.querySelector(`#list${l} .sub-contents`);
            const allId = l === 'ALL' ? 'GlobalALL' : l + '_ALL';
            container.innerHTML = `<div style="text-align:center; margin-bottom:10px;">
                <button class="sub-tab-button active" onclick="openSubTab(event, '${allId}')">כל הכוכבים</button>
                <button class="sub-tab-button" onclick="openSubTab(event, '${l}1')">★ 1</button>
                <button class="sub-tab-button" onclick="openSubTab(event, '${l}2')">★★ 2</button>
                <button class="sub-tab-button" onclick="openSubTab(event, '${l}3')">★★★ 3</button>
            </div>`;
            content.innerHTML = `
                <div id="${allId}" class="sub-tab-content active"><table id="table_${allId}"><tbody></tbody></table></div>
                <div id="${l}1" class="sub-tab-content"><table id="table_${l}1"><tbody></tbody></table></div>
                <div id="${l}2" class="sub-tab-content"><table id="table_${l}2"><tbody></tbody></table></div>
                <div id="${l}3" class="sub-tab-content"><table id="table_${l}3"><tbody></tbody></table></div>`;
        });
    }

    function renderAll() {
        document.querySelectorAll('tbody').forEach(b => b.innerHTML = '');
        let sorted = [...allData].sort((a,b) => a.he.localeCompare(b.he, 'he'));
        
        sorted.forEach(item => {
            const targets = [item.type + '_ALL', item.type + item.stars, 'ALL_ALL', 'ALL' + item.stars, 'GlobalALL'];
            targets.forEach(tId => {
                const tbody = document.querySelector(`#table_${tId} tbody`);
                if(!tbody) return;
                const tr = document.createElement('tr');
                tr.className = 'data-row';
                tr.dataset.isSent = item.isSent;
                tr.dataset.posHe = item.posHe;
                tr.dataset.posEn = item.posEn;
                tr.dataset.isProfane = item.isProfane;
                tr.innerHTML = `
                    <td>${item.he}<span class="info-tag">${item.posHe}</span></td>
                    <td>${item.en}<span class="info-tag">${item.posEn}</span></td>
                `;
                tbody.appendChild(tr);
            });
        });
        filterTables();
    }

    function filterTables() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        let count = 0;
        const activeSub = document.querySelector('.tab-content.active .sub-tab-content.active');

        document.querySelectorAll('.data-row').forEach(row => {
            const isVisibleSub = row.closest('.sub-tab-content') === activeSub;
            if(!isVisibleSub) { row.style.display = 'none'; return; }

            if(kidsMode && row.dataset.isProfane === 'true') { row.style.display = 'none'; return; }

            const matchType = (selectedTypeFilter === 'all') || 
                             (selectedTypeFilter === 'sent' && row.dataset.isSent === 'true') ||
                             (selectedTypeFilter === 'word' && row.dataset.isSent === 'false');
            
            const matchPosHe = (selectedPosHeFilter === 'all') || (row.dataset.posHe === selectedPosHeFilter);
            const matchPosEn = (selectedPosEnFilter === 'all') || (row.dataset.posEn === selectedPosEnFilter);
            const matchSearch = row.innerText.toLowerCase().includes(q);

            if(matchType && matchPosHe && matchPosEn && matchSearch) {
                row.style.display = '';
                count++;
            } else {
                row.style.display = 'none';
            }
        });
        document.getElementById('noResults').style.display = count === 0 ? 'block' : 'none';
    }

    // פונקציות שינוי סינונים
    function toggleTypeFilter(val, btn) {
        selectedTypeFilter = val;
        document.querySelectorAll('.filter-group:nth-child(2) .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterTables();
    }

    function togglePosHeFilter(val, btn) {
        selectedPosHeFilter = val;
        document.querySelectorAll('.pos-he-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterTables();
    }

    function togglePosEnFilter(val, btn) {
        selectedPosEnFilter = val;
        document.querySelectorAll('.pos-en-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        filterTables();
    }

    function toggleKidsMode() {
        kidsMode = !kidsMode;
        const btn = document.getElementById('kidsBtn');
        btn.classList.toggle('active');
        btn.innerText = kidsMode ? "👶 מצב ילדים: פעיל" : "👶 מצב ילדים: כבוי";
        filterTables();
    }

    function openTab(e, id) {
        document.querySelectorAll('.tab-button, .tab-content').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        filterTables();
    }

    function openSubTab(e, id) {
        const parent = e.currentTarget.closest('.tab-content');
        parent.querySelectorAll('.sub-tab-button, .sub-tab-content').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
        filterTables();
    }

    function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

    fetchData();
</script>
</body>
</html>
